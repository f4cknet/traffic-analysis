# login_paths.yaml - 登录后台路径模式库
#
# 用途: 识别攻击者尝试登录的接口. 只关心"真登录接口", 不关心:
#       - 后台首页 (/admin/, /dede/index.php 等)
#       - 注册接口 (/user/register, /signup)
#       - 调试端点 (/actuator/, /swagger-ui, /kibana 等)
#
# 加新后台: 加一条规则, 填 patterns + methods 即可. 代码无需改.
#
# 字段:
# - patterns: URI path 子串 (不分大小写). query string 不参与匹配 (parse_records 拆 uri_path)
# - methods:  哪些 HTTP 方法命中算"尝试登录". 默认 [POST] (POST 是提交凭证的金标准).
#             大部分登录接口填 [POST]; 也支持 GET 表单的 (如部分 CMS) 可写 [GET, POST]
#
# 规则优先级: yaml 顺序优先. 把更具体/更长的 pattern 放前面, 避免子串 overlap 误命中.

login_paths:

  # ============== 一线: 通用登录入口 ==============
  - id: login_generic
    name: 通用登录入口 (/login)
    category: login
    description: 常见登录入口 (MVC 框架居多). patterns 按"具体度倒序"排, 避免短 pattern (/login) 抢命中
    methods: [POST]
    patterns:
      # 长/具体的先 (避免被短 pattern 抢)
      - "/administrator/login"
      - "/management/login"
      - "/account/login"
      - "/admin/login"
      - "/admin/login.php"
      - "/admin/login.html"
      - "/admin/login.jsp"
      - "/user/login"
      - "/users/login"
      - "/manage/login"
      - "/auth/login"
      - "/auth/signin"
      - "/oauth/login"
      - "/api/login"
      - "/userLogin"
      - "/user_login"
      - "/doLogin"
      - "/dologin"
      - "/checkLogin"
      - "/checklogin"
      - "/ajaxLogin"
      # 短/通用的后
      - "/login.php"
      - "/login.html"
      - "/login.jsp"
      - "/login.aspx"
      - "/login"
      - "/signin"
      - "/sign-in"
      - "/sign_in"

  - id: login_action
    name: Java/CMS 风格 Action 登录
    category: login
    description: Struts/Spring/Jira 风格的 action 登录
    methods: [POST]
    patterns:
      - "/login.action"
      - "/login.do"
      - "/j_security_check"
      - "/j_spring_security_check"

  # ============== 二线: CMS 后台登录 ==============
  - id: wordpress
    name: WordPress 登录
    category: cms
    description: WordPress 自带登录页 wp-login.php
    methods: [GET, POST]
    patterns:
      - "/wp-login.php"

  - id: dedecms
    name: Dedecms 登录
    category: cms
    description: Dedecms (织梦) 后台登录页
    methods: [POST]
    patterns:
      - "/dede/login.php"

  - id: discuz
    name: Discuz! 后台登录
    category: cms
    description: Discuz! 后台控制面板 (admincp.php 是登录页)
    methods: [POST]
    patterns:
      - "/uc_server/admincp.php"
      - "/admincp.php"

  - id: typecho
    name: Typecho 后台登录
    category: cms
    description: Typecho 后台登录页
    methods: [POST]
    patterns:
      - "/admin/login.php"

  - id: joomla
    name: Joomla 登录
    category: cms
    description: Joomla 自带登录
    methods: [POST]
    patterns:
      - "/administrator/index.php"

  - id: magento
    name: Magento 后台
    category: cms
    description: Magento 后台登录
    methods: [POST]
    patterns:
      - "/admin/admin_login"

  - id: ecshop
    name: ECShop 后台
    category: cms
    description: ECShop 后台登录
    methods: [POST]
    patterns:
      - "/admin/login.php"
      - "/admin/privilege.php"

  # ============== 三线: 数据库/服务管理后台 (根路径即登录) ==============
  - id: phpmyadmin
    name: phpMyAdmin
    category: db
    description: 经典 MySQL Web 管理 (根路径就是登录)
    methods: [GET, POST]
    patterns:
      - "/phpmyadmin/"
      - "/phpmyadmin/index.php"
      - "/phpMyAdmin/"
      - "/pma/"
      - "/mysql/"
      - "/dbadmin/"
      - "/sqlmanager/"

  - id: adminer
    name: Adminer (单文件 DB 管理)
    category: db
    description: Adminer 单文件数据库管理工具 (单文件即登录页)
    methods: [GET, POST]
    patterns:
      - "/adminer.php"
      - "/adminer/"
      - "/adminer-4."

  - id: pgadmin
    name: pgAdmin
    category: db
    description: PostgreSQL Web 管理 (根路径是登录)
    methods: [GET, POST]
    patterns:
      - "/pgadmin/"
      - "/pgadmin4/"

  - id: redis_commander
    name: Redis Commander
    category: db
    description: Redis Web 管理 (根路径是登录)
    methods: [GET, POST]
    patterns:
      - "/redis-commander"
      - "/redis_ui"

  # ============== 四线: 框架自带登录页 ==============
  - id: weblogic
    name: WebLogic Console 登录
    category: framework
    description: Oracle WebLogic 控制台登录
    methods: [GET, POST]
    patterns:
      - "/console/login"

  - id: jenkins
    name: Jenkins 登录
    category: framework
    description: Jenkins CI/CD 登录页
    methods: [GET, POST]
    patterns:
      - "/jenkins/login"
      - "/login?from=%2F"

  - id: confluence
    name: Confluence 登录
    category: framework
    description: Atlassian Confluence 登录
    methods: [GET, POST]
    patterns:
      - "/confluence/login"

  - id: gitlab
    name: GitLab 登录
    category: framework
    description: GitLab 自带登录
    methods: [GET, POST]
    patterns:
      - "/users/sign_in"

  - id: harbor
    name: Harbor Registry 登录
    category: framework
    description: Harbor 镜像仓库登录
    methods: [GET, POST]
    patterns:
      - "/harbor/sign-in"

  - id: grafana
    name: Grafana 登录
    category: framework
    description: Grafana 监控面板登录
    methods: [GET, POST]
    patterns:
      - "/grafana/login"
      - "/login"

  - id: nexus
    name: Nexus Repository 登录
    category: framework
    description: Sonatype Nexus 仓库管理登录
    methods: [GET, POST]
    patterns:
      - "/nexus/"
      - "/nexus/content"
