# webshell_fields.yaml - webshell 访问参数字段别名
#
# 用途: 从 webshell 访问请求 (GET/POST) 里识别"密码/命令"参数.
#       webshell 工具 (中国菜刀/蚁剑/冰蝎/哥斯拉) 提交命令时通常用这些字段名.
#
# 加新字段: 直接在对应类别下加一行. **无需改代码**.
#
# 类别:
#   - password:  webshell 的密码字段 (服务端据此鉴权)
#   - cmd:       命令字段 (webshell 收到的命令)
#
# 实战经验:
#   - 中国菜刀: 字段名可能是任意的, 但密码字段通常固定
#   - 蚁剑:     默认密码字段是 0 (即第一个 POST 字段)
#   - 冰蝎:     AES 加密的 POST body, 字段名是固定的 (pass / key)
#   - 哥斯拉:   类似冰蝎
#
# 设计: yaml 顺序即优先级, 第一条命中胜出.

fields:

  # ============== 密码字段 ==============
  password:
    - pass                # 通用
    - pwd                 # 通用
    - password            # 通用
    - key                 # 冰蝎
    - code                # 自定义
    - x                   # 单字符, 常见
    - z0                  # 自定义 (z0/z1/z2 模式)
    - z1
    - z2
    - 0                   # 蚁剑默认 (第一个 POST 字段)

  # ============== 命令字段 ==============
  cmd:
    - cmd                 # 通用
    - c                   # 单字符
    - command             # 通用
    - exec                # 通用
    - run                 # 通用
    - action              # 通用
    - do                  # 通用
    - query               # 通用
    - sql                 # SQL 注入 payload
    - 1                   # 蚁剑默认 (第二个 POST 字段)