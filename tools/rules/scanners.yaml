# 扫描器/工具指纹规则库
#
# 匹配字段三级：
#   ua              → User-Agent 字段（强证据）
#   header          → 任意 header 名或值（强证据，自定义 header 是金标准）
#   payload_keywords → URI / 请求 body 字面量（弱辅证）
#
# 加新扫描器只需新增一条规则，代码无需改动。

scanners:

  # ============== 一线：自报家门的强特征 ==============

  - id: sqlmap
    name: sqlmap
    category: sqli_scanner
    ctf_priority: 10
    description: SQL 注入自动化工具，UA 自带版本号
    match:
      ua:
        - "sqlmap/"
    weight:
      ua: 10
      header: 10
      payload: 1

  - id: acunetix_wvs
    name: Acunetix Web Vulnerability Scanner (AWVS)
    category: web_vuln_scanner
    ctf_priority: 10
    description: 商业 Web 漏洞扫描器，UA 伪装成 Chrome 但会塞探针 + 自定义 header
    match:
      ua:
        - "acunetix_wvs_security_test"
        - "print(md5(acunetix_wvs_security_test))"
      header:
        - "Acunetix-Aspect"
        - "Acunetix-Aspect-Password"
        - "Acunetix-Aspect-Queries"
      payload_keywords:
        - "acunetix"
        - "acunetix-wvs-test"
        - "some_inexistent_file_with_long_name"
    weight:
      ua: 10
      header: 12
      payload: 1

  - id: nessus
    name: Nessus
    category: vuln_scanner
    ctf_priority: 9
    description: Tenable Nessus 漏洞扫描器，UA 自带 Nessus 字样
    match:
      ua:
        - "Nessus"
        - "Nessus SOAP"
        - "nessus/"
    weight:
      ua: 10
      header: 10
      payload: 1

  - id: nikto
    name: Nikto
    category: web_vuln_scanner
    ctf_priority: 9
    match:
      ua:
        - "Nikto/"
    weight:
      ua: 10
      header: 10
      payload: 1

  - id: wpscan
    name: WPScan
    category: web_vuln_scanner
    ctf_priority: 8
    match:
      ua:
        - "WPScan"
    weight:
      ua: 10
      header: 10
      payload: 1

  - id: whatweb
    name: WhatWeb
    category: web_fingerprint
    ctf_priority: 6
    match:
      ua:
        - "WhatWeb/"
    weight:
      ua: 10
      header: 10
      payload: 1

  - id: wfuzz
    name: Wfuzz
    category: web_fuzzer
    ctf_priority: 6
    match:
      ua:
        - "Wfuzz/"
    weight:
      ua: 10
      header: 10
      payload: 1

  - id: dirbuster
