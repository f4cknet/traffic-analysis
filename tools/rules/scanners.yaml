  # ============== 攻击者特征 header（非工具但可识别） ==============

  - id: xff_injector
    name: X-Forwarded-For 注入器
    category: attack_pattern
    ctf_priority: 3
    description: 通过伪造 XFF / Client-IP 头绕过 IP 限制
    match:
      header:
        - "X-Forwarded-For"
        - "Client-IP"
        - "X-Real-IP"
    weight:
      header: 3

  - id: webdav_client
    name: WebDAV 客户端
    category: attack_pattern
    ctf_priority: 3
    description: 含 Depth header 的 WebDAV PROPFIND 请求
    match:
      header:
        - "Depth"
    weight:
      header: 5